name: Bore Bridge to VPS
on: workflow_dispatch

jobs:
  bridge:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          sudo apt-get update && sudo apt-get install -y openssh-server
          echo "runner:rohan2026" | sudo chpasswd
          sudo sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh

      - name: Start Bore Tunnel
        run: |
          # Download Bore
          curl -L https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz | tar zx
          sudo mv bore /usr/local/bin/
          
          # Start tunnel for SSH (Port 22)
          echo "Connecting to bore.pub..."
          nohup bore local 22 --to bore.pub > bore.log 2>&1 &
          
          sleep 5
          grep "listening at" bore.log || (cat bore.log && exit 1)
          echo "=========================================="
          echo "CONNECT VIA TERMUX USING:"
          echo "ssh runner@bore.pub -p $(grep -oP '(?<=listening at bore.pub:)\d+' bore.log)"
          echo "Password: rohan2026"
          echo "=========================================="

      - name: Keep Alive
        run: sleep 21600
