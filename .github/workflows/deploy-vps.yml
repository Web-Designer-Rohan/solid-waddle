name: Temporary Kali Linux VPS
on: workflow_dispatch

jobs:
  vps:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Kali Linux Container
        run: |
          # 1. Pull and Start Kali Linux in the background
          # We map port 2222 on the host to port 22 in the container
          docker run -d --name kali-vps -p 2222:22 kalilinux/kali-rolling /bin/bash -c "
            apt-get update && \
            apt-get install -y openssh-server kali-linux-headless && \
            mkdir /var/run/sshd && \
            echo 'root:rohan2026' | chpasswd && \
            sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config && \
            /usr/sbin/sshd -D
          "

          # 2. Install cloudflared on the Ubuntu host
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

          # 3. Start Tunnel pointing to the Kali container (Port 2222)
          cloudflared tunnel --url ssh://localhost:2222 --logfile tunnel.log > /dev/null 2>&1 &
          
          echo "Booting Kali Linux... This may take a minute as tools install."
          sleep 45 # Giving extra time for Kali tools to initialize
          
          echo "=========================================="
          echo "SUCCESS! YOUR KALI VPS IS READY"
          grep -o 'https://[^[:space:]]*\.trycloudflare\.com' tunnel.log || echo "Link generating... check logs in 10s."
          echo "Login: root | Password: rohan2026"
          echo "=========================================="
          
          # 4. KEEP ALIVE
          sleep 21600
